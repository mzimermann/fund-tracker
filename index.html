<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Smart Money Radar</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SMR">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090f;--card:#111320;--card2:#161826;--border:#1e2235;
  --tx:#e8eaf2;--mu:#6b7490;--mu2:#9aa0bc;
  --buy:#00d68f;--buy-bg:rgba(0,214,143,.1);
  --sell:#ff4757;--sell-bg:rgba(255,71,87,.1);
  --watch:#ffa502;--watch-bg:rgba(255,165,2,.1);
  --blue:#3d7bff;
  --ff:'Plus Jakarta Sans',sans-serif;
  --r:14px;
}
html,body{height:100%;font-family:var(--ff);background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;overflow-x:hidden}

/* ── APP LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:500px;margin:0 auto}
.content{flex:1;padding:0 0 80px}

/* ── TOP BAR ── */
.topbar{padding:16px 18px 12px;background:var(--bg);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.app-name{font-weight:800;font-size:1.15rem;letter-spacing:-.02em}
.app-name span{color:var(--buy)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--buy);box-shadow:0 0 8px var(--buy)}
.date-line{font-size:.75rem;color:var(--mu);margin-top:3px}

/* ── MARKET BAR ── */
.mkt-bar{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;background:var(--card)}
.mkt-bar::-webkit-scrollbar{display:none}
.mkt-tile{padding:10px 16px;flex-shrink:0;border-right:1px solid var(--border);text-align:center}
.mkt-v{font-weight:700;font-size:.92rem}
.mkt-l{font-size:.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-top:1px}
.mkt-c{font-size:.68rem;margin-top:1px}
.up{color:var(--buy)}.down{color:var(--sell)}.neu{color:var(--mu)}
.mkt-mood{padding:10px 14px;flex-shrink:0;display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--mu2)}

/* ── TABS ── */
.tabs{display:flex;gap:6px;padding:14px 18px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .18s;border:1.5px solid var(--border);color:var(--mu);background:transparent;flex-shrink:0}
.tab:hover{color:var(--tx)}
.tab.on-buy{background:var(--buy-bg);border-color:var(--buy);color:var(--buy)}
.tab.on-sell{background:var(--sell-bg);border-color:var(--sell);color:var(--sell)}
.tab.on-watch{background:var(--watch-bg);border-color:var(--watch);color:var(--watch)}
.tab.on-all{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:var(--tx)}

/* ── SECTION ── */
.section{padding:16px 18px 0}
.section-title{font-weight:700;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── SIGNAL CARD ── */
.sig-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .18s,transform .12s;position:relative;overflow:hidden}
.sig-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.sig-card.buy::before{background:var(--buy)}
.sig-card.sell::before{background:var(--sell)}
.sig-card.watch::before{background:var(--watch)}
.sig-card.event::before{background:var(--blue)}
.sig-card:active{transform:scale(.98)}
.sig-card.buy:hover{border-color:rgba(0,214,143,.35)}
.sig-card.sell:hover{border-color:rgba(255,71,87,.35)}

.card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-left{display:flex;align-items:center;gap:10px}
.card-icon{width:42px;height:42px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;font-weight:700;font-size:.9rem;color:var(--mu2)}
.card-names .ticker{font-weight:800;font-size:1.1rem;letter-spacing:-.01em}
.card-names .company{font-size:.78rem;color:var(--mu2);margin-top:1px}
.action-pill{padding:5px 11px;border-radius:6px;font-size:.72rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;flex-shrink:0}
.pill-buy{background:var(--buy-bg);color:var(--buy);border:1.5px solid rgba(0,214,143,.3)}
.pill-sell{background:var(--sell-bg);color:var(--sell);border:1.5px solid rgba(255,71,87,.3)}
.pill-watch{background:var(--watch-bg);color:var(--watch);border:1.5px solid rgba(255,165,2,.3)}
.pill-event{background:rgba(61,123,255,.1);color:var(--blue);border:1.5px solid rgba(61,123,255,.3)}

.card-reason{font-size:.88rem;color:var(--mu2);line-height:1.55;margin-bottom:12px}
.card-reason strong{color:var(--tx)}

.card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.meta-chip{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:.68rem;color:var(--mu);display:flex;align-items:center;gap:4px}
.meta-chip.fresh{color:var(--buy);border-color:rgba(0,214,143,.25);background:var(--buy-bg)}
.meta-chip.old{color:var(--watch);border-color:rgba(255,165,2,.25);background:var(--watch-bg)}
.confidence{display:flex;gap:3px;align-items:center}
.conf-dot{width:6px;height:6px;border-radius:2px;background:var(--border)}
.conf-dot.filled{background:var(--buy)}
.conf-dot.filled-sell{background:var(--sell)}

.card-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.btn-isin{flex:1;background:var(--buy);color:#00160c;padding:10px;border-radius:8px;font-weight:700;font-size:.82rem;border:none;cursor:pointer;transition:filter .15s}
.btn-isin:hover{filter:brightness(1.1)}
.btn-isin.sell-btn{background:var(--sell);color:#160004}
.btn-wl{background:var(--card2);border:1px solid var(--border);color:var(--mu);padding:10px 14px;border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .15s}
.btn-wl:hover{border-color:var(--watch);color:var(--watch)}
.btn-wl.on{background:var(--watch-bg);border-color:var(--watch);color:var(--watch)}

/* ── DETAIL EXPAND ── */
.card-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.card-detail.open{display:block}
.detail-block{margin-bottom:8px}
.detail-label{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:3px}
.detail-txt{font-size:.82rem;color:var(--mu2);line-height:1.5}
.isin-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:monospace;font-size:.88rem;color:var(--tx);letter-spacing:.05em;margin-top:4px}

/* ── AI PANEL ── */
.ai-panel{background:var(--card);border:1.5px solid rgba(61,123,255,.25);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.ai-header{background:rgba(61,123,255,.08);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(61,123,255,.15)}
.ai-label{font-weight:700;font-size:.85rem;color:var(--blue)}
.ai-ts{font-size:.65rem;color:var(--mu)}
.ai-body{padding:14px 16px}
.ai-summary{font-size:.86rem;color:var(--mu2);line-height:1.65;margin-bottom:12px}
.ai-prop{background:var(--card2);border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid var(--buy)}
.ai-prop.sell-prop{border-left-color:var(--sell)}
.ai-prop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ai-prop-ticker{font-weight:800;font-size:.95rem}
.ai-prop-conf{font-size:.65rem;padding:2px 6px;border-radius:4px;background:var(--buy-bg);color:var(--buy);font-weight:700}
.ai-prop.sell-prop .ai-prop-conf{background:var(--sell-bg);color:var(--sell)}
.ai-prop-why{font-size:.8rem;color:var(--mu2);line-height:1.5;margin-bottom:5px}
.ai-prop-risk{font-size:.73rem;color:var(--sell);opacity:.85}
.ai-footer{background:rgba(0,0,0,.2);padding:10px 14px;font-size:.7rem;color:var(--mu);line-height:1.5;border-top:1px solid var(--border)}

/* ── EMPTY ── */
.empty{text-align:center;padding:50px 20px;color:var(--mu)}
.empty svg{opacity:.3;margin-bottom:12px}
.empty h3{font-size:1rem;margin-bottom:6px;color:var(--mu2)}
.empty p{font-size:.82rem;line-height:1.6}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;background:rgba(8,9,15,.95);border-top:1px solid var(--border);display:flex;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;transition:color .15s;border:none;background:none;color:var(--mu);font-family:var(--ff)}
.nav-btn .nav-ico{font-size:1.2rem;display:block;margin-bottom:2px}
.nav-btn .nav-lbl{font-size:.6rem;font-weight:600;letter-spacing:.04em;display:block}
.nav-btn.active{color:var(--buy)}
.nav-btn.active-sell{color:var(--sell)}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--buy);color:#001a0a;padding:9px 18px;border-radius:8px;font-weight:700;font-size:.82rem;z-index:300;opacity:0;transition:opacity .22s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}

/* ── CHECKLIST ── */
.cl-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.cl-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-item input{width:18px;height:18px;accent-color:var(--buy);cursor:pointer;flex-shrink:0}
.cl-item label{font-size:.86rem;cursor:pointer;line-height:1.4;color:var(--mu2)}
.cl-item:has(input:checked) label{text-decoration:line-through;color:var(--mu)}

/* ── GUIDE ── */
.guide-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.guide-q{font-weight:700;font-size:.88rem;margin-bottom:6px;color:var(--tx)}
.guide-a{font-size:.82rem;color:var(--mu2);line-height:1.55}
.action-buy-ex{color:var(--buy);font-weight:700}
.action-sell-ex{color:var(--sell);font-weight:700}
</style>
</head>
<body>
<div class="app">

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div class="app-name">Smart<span>Money</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusTxt" style="font-size:.72rem;color:var(--mu)">En ligne</span>
    </div>
  </div>
  <div class="date-line" id="dateLine">—</div>
</div>

<!-- MARKET BAR -->
<div class="mkt-bar" id="mktBar">
  <div class="mkt-tile"><div class="mkt-v neu">—</div><div class="mkt-l">Chargement</div></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab on-all" data-tab="all" onclick="switchTab(this,'all')">Tout voir</button>
  <button class="tab" data-tab="buy" onclick="switchTab(this,'buy')">🟢 Acheter</button>
  <button class="tab" data-tab="sell" onclick="switchTab(this,'sell')">🔴 Vendre</button>
  <button class="tab" data-tab="watch" onclick="switchTab(this,'watch')">⭐ Watchlist</button>
  <button class="tab" data-tab="ai" onclick="switchTab(this,'ai')">🧠 Analyse IA</button>
</div>

<!-- CONTENT -->
<div class="content">
  <div id="viewAll"></div>
  <div id="viewBuy" style="display:none"></div>
  <div id="viewSell" style="display:none"></div>
  <div id="viewWatch" style="display:none"></div>
  <div id="viewAI" style="display:none"></div>
  <div id="viewGuide" style="display:none"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab(document.querySelector('[data-tab=all]'),'all')">
    <span class="nav-ico">📊</span><span class="nav-lbl">Signaux</span>
  </button>
  <button class="nav-btn" onclick="switchTab(document.querySelector('[data-tab=buy]'),'buy')">
    <span class="nav-ico">🟢</span><span class="nav-lbl">Acheter</span>
  </button>
  <button class="nav-btn active-sell" onclick="switchTab(document.querySelector('[data-tab=sell]'),'sell')" style="color:var(--mu)">
    <span class="nav-ico">🔴</span><span class="nav-lbl">Vendre</span>
  </button>
  <button class="nav-btn" onclick="switchTab(document.querySelector('[data-tab=ai]'),'ai')">
    <span class="nav-ico">🧠</span><span class="nav-lbl">IA</span>
  </button>
  <button class="nav-btn" onclick="switchTab(null,'guide')">
    <span class="nav-ico">❓</span><span class="nav-lbl">Guide</span>
  </button>
</div>

</div><!-- /app -->
<div class="toast" id="toast"></div>

<script>
const EMBEDDED_DATA = null;
let D={}, WL=JSON.parse(localStorage.getItem('smr_wl')||'[]'), TAB='all';

async function boot(){
  if(EMBEDDED_DATA&&EMBEDDED_DATA.meta)D=EMBEDDED_DATA,render();
  try{const r=await fetch('./data.json',{cache:'no-store'});if(r.ok){D=await r.json();render();}}catch(e){}
}
boot();

// ISIN from CUSIP
function cusipToISIN(c){
  if(!c||c.length!==9)return'';
  const raw='US'+c.toUpperCase();let d='';
  for(const x of raw)d+=x>='0'&&x<='9'?x:String(x.charCodeAt(0)-65+10);
  let s=0;
  for(let i=0;i<d.length;i++){let n=parseInt(d[d.length-1-i]);if(i%2===0){n*=2;if(n>9)n-=9;}s+=n;}
  return raw+((10-(s%10))%10);
}

// Human-readable reason
function humanReason(a){
  const fund=a.fund||a.entity||'Un grand fonds';
  const co=a.name||a.ticker||'';
  const src=a.source||'';
  if(src.includes('Insider')||src.includes('Form 4')){
    return`<strong>${esc(a.entity||'Un dirigeant')}</strong> a acheté pour <strong>${esc(a.note||'un montant significatif')}</strong> d'actions de sa propre entreprise.`;
  }
  if(src.includes('13D')||src.includes('13G')){
    return`<strong>${esc(a.entity||'Un activiste')}</strong> a franchi le seuil de 5% dans <strong>${esc(co)}</strong>. Cela peut signaler une prise de contrôle ou une pression sur la direction.`;
  }
  if(src.includes('Short')){
    return`<strong>${(parseFloat(a.short_pct||0)+'%')}</strong> des actions de ${esc(co)} sont vendues à découvert. Si une bonne nouvelle arrive, le cours peut bondir fortement (<em>short squeeze</em>).`;
  }
  if(src.includes('Earn')){return`${esc(co)} publie ses résultats trimestriels <strong>${esc(a.note||'prochainement')}</strong>. Moment clé pour le cours.`;}
  if(src.includes('ETF')){return`L'ETF ${esc(a.entity||'')} a <strong>${a.type==='buy'?'augmenté':'réduit'}</strong> sa position sur ${esc(co)}.`;}
  if(src.includes('NBIM')){return`Le fonds souverain norvégien (<strong>1 800 milliards $</strong>) a modifié sa position sur ${esc(co)}.`;}
  if(src.includes('DeepSeek')||src.includes('IA')){return esc(a.pourquoi_detaille||a.raison||a.why||'Signal identifié par l\'analyse IA.');}
  // 13F
  const typeMap={new:`<strong>${esc(fund)}</strong> a acheté <strong>${esc(co)}</strong> pour la première fois. C'est un nouveau pari du fonds.`,
    increase:`<strong>${esc(fund)}</strong> a <strong>renforcé</strong> sa position sur ${esc(co)} (${esc(a.shares_change||'')}).`,
    exit:`<strong>${esc(fund)}</strong> a <strong>vendu TOUTES</strong> ses actions ${esc(co)}. Le fonds ne croit plus en cette société.`,
    reduction:`<strong>${esc(fund)}</strong> a <strong>réduit</strong> sa position sur ${esc(co)} (${esc(a.shares_change||'')}).`};
  return typeMap[a.type]||esc(a.context||a.note||a.why||'Signal détecté.');
}

function score(a){
  if(a.score)return a.score;
  let s=50;
  if(a.consensus&&a.consensus!=='—')s+=18;
  if(a.severity==='high')s+=14;
  if(a.type==='new')s+=8;
  if((a.source||'').includes('Insider'))s+=16;
  const w=parseFloat(a.weight||a.new_weight||0);
  if(w>5)s+=10;else if(w>2)s+=5;
  return Math.min(100,s);
}
function confDots(s,type){
  const n=s>=80?5:s>=65?4:s>=50?3:s>=35?2:1;
  const cl=type==='sell'?'filled-sell':'filled';
  return Array.from({length:5},(_,i)=>`<span class="conf-dot ${i<n?cl:''}"></span>`).join('');
}
function actType(a){
  const t=a.type||'';
  if(t==='new'||t==='increase'||t==='buy')return'buy';
  if(t==='exit'||t==='reduction'||t==='sell')return'sell';
  if(t==='event')return'event';
  return'watch';
}
function freshChip(a){
  const src=a.source||'';
  if(src.includes('Insider')||src.includes('Form 4')||src.includes('13D'))
    return`<span class="meta-chip fresh">🟢 Récent</span>`;
  if(a.type==='new'||a.type==='increase')
    return`<span class="meta-chip old">🟡 Ce trimestre</span>`;
  return`<span class="meta-chip old">🟠 Données ~45j</span>`;
}
function srcChip(a){
  const s=a.source||'13F SEC';
  const map={'Insider':'👤','Form 4':'👤','13D':'⚡','13G':'⚡','ETF':'📊','Short':'📉','Earn':'📅','NBIM':'🏦','Soft':'🏢','AMF':'🇪🇺','BaFin':'🇩🇪','DeepSeek':'🧠','IA':'🧠'};
  const ico=Object.entries(map).find(([k])=>s.includes(k))?.[1]||'🏛';
  return`<span class="meta-chip">${ico} ${esc(s)}</span>`;
}

function buildSigs(){
  let s=[];
  for(const a of(D.alerts||[])){
    const isin=a.isin||cusipToISIN(a.cusip||'');
    s.push({...a,isin,_type:actType(a),_score:score(a),_human:humanReason(a)});
  }
  for(const g of(D.global_signals||[])){
    const isin=g.isin||cusipToISIN(g.cusip||'');
    const at=actType(g);
    s.push({...g,ticker:g.ticker||'—',isin,_type:at,_score:score({...g,severity:'high'}),_human:humanReason(g)});
  }
  for(const p of(D.ai_analysis?.propositions_achat||[])){
    if(!s.find(x=>x.ticker===p.ticker&&x._type==='buy'))
      s.push({...p,name:p.nom||p.ticker,source:'IA DeepSeek',fund:'DeepSeek',isin:p.isin||'',type:'buy',_type:'buy',_score:p.score||60,_human:humanReason({...p,pourquoi_detaille:p.pourquoi_detaille||p.raison})});
  }
  for(const p of(D.ai_analysis?.propositions_vente||[])){
    if(!s.find(x=>x.ticker===p.ticker&&x._type==='sell'))
      s.push({...p,name:p.nom||p.ticker,source:'IA DeepSeek',fund:'DeepSeek',isin:p.isin||'',type:'sell',_type:'sell',_score:p.score||60,_human:humanReason({...p,pourquoi_detaille:p.pourquoi_detaille||p.raison})});
  }
  const seen=new Map();
  s.forEach(x=>{const k=x.ticker+x._type;if(!seen.has(k)||x._score>seen.get(k)._score)seen.set(k,x);});
  return Array.from(seen.values()).sort((a,b)=>b._score-a._score);
}

let SIGS=[];

// ── RENDER ──
function render(){
  renderTopBar();
  renderMarket();
  SIGS=buildSigs();
  renderView();
}
function renderView(){
  renderAll_();renderBuy_();renderSell_();renderWatch_();renderAI_();renderGuide_();
}

function renderTopBar(){
  const meta=D.meta||{},mkt=D.market||{};
  const g=meta.generated_at;
  const snap=mkt.snapshot||[];
  const vix=parseFloat((snap.find(t=>t.label==='VIX')||{}).value||0);
  let mood='Marchés calmes';
  if(vix>30)mood='⚠️ Marchés agités — prudence';
  else if(vix>20)mood='Marchés sous tension';
  if(g){
    const d=new Date(g);
    document.getElementById('dateLine').textContent=
      'Mis à jour le '+d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})+
      ' à '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+' · '+mood;
  } else {
    document.getElementById('dateLine').textContent=mood;
  }
}

function renderMarket(){
  const snap=(D.market||{}).snapshot||[];
  const want=['S&P 500','Nasdaq','VIX','Brent','Or'];
  const el=document.getElementById('mktBar');
  let html=snap.filter(t=>want.includes(t.label)).map(t=>`
    <div class="mkt-tile">
      <div class="mkt-v ${t.dir}">${t.value}</div>
      <div class="mkt-l">${t.label}</div>
      <div class="mkt-c ${t.dir}">${t.change||''}</div>
    </div>`).join('');
  const news=(D.market?.news||[]);
  if(news.length)html+=`<div class="mkt-mood">📰 ${esc(news[0].title||news[0])}</div>`;
  el.innerHTML=html||'<div class="mkt-tile"><div class="mkt-v neu">—</div><div class="mkt-l">Données indisponibles</div></div>';
}

function makeCard(s,idx){
  const type=s._type;
  const isin=s.isin||'';
  const wl=WL.includes(s.ticker);
  const actionLabel=type==='buy'?'ACHETER':type==='sell'?'VENDRE':type==='event'?'ÉVÉNEMENT':'SURVEILLER';
  const pillCls=type==='buy'?'pill-buy':type==='sell'?'pill-sell':type==='event'?'pill-event':'pill-watch';
  const btnCls=type==='sell'?'sell-btn':'';
  const drift=s.cross_read||s.drift||'';
  const detail=`
    <div class="card-detail" id="det${idx}">
      <div class="detail-block">
        <div class="detail-label">Explication complète</div>
        <div class="detail-txt">${s._human}</div>
      </div>
      ${drift?`<div class="detail-block" style="margin-top:8px">
        <div class="detail-label">⏱ Décalage depuis le signal</div>
        <div class="detail-txt">${esc(drift)}</div>
      </div>`:''}
      ${isin?`<div class="detail-block" style="margin-top:8px">
        <div class="detail-label">ISIN — à coller dans Trade Republic</div>
        <div class="isin-box">${isin}</div>
      </div>`:''}
      ${s.consensus&&s.consensus!=='—'?`<div class="detail-block" style="margin-top:8px">
        <div class="detail-label">👥 Consensus</div>
        <div class="detail-txt">${esc(s.consensus)}</div>
      </div>`:''}
    </div>`;
  return`<div class="sig-card ${type}" onclick="toggleDet('det${idx}')">
    <div class="card-head">
      <div class="card-left">
        <div class="card-icon">${s.ticker.substring(0,3)}</div>
        <div class="card-names">
          <div class="ticker">${esc(s.ticker)}</div>
          <div class="company">${esc(s.name||s.entity||'')}</div>
        </div>
      </div>
      <div><span class="action-pill ${pillCls}">${actionLabel}</span></div>
    </div>
    <div class="card-reason">${s._human}</div>
    <div class="card-meta">
      ${freshChip(s)}${srcChip(s)}
      <span class="meta-chip" style="gap:3px">
        <div class="confidence">${confDots(s._score,type)}</div>
        ${s._score>=70?'Fort':s._score>=50?'Moyen':'Faible'}
      </span>
    </div>
    ${detail}
    <div class="card-actions">
      <button class="btn-isin ${btnCls}" onclick="event.stopPropagation();cp('${isin||s.ticker}','${isin?'ISIN':'Ticker'}','${esc(s.ticker)}')">${isin?'📋 Copier ISIN pour Trade Republic':'📋 Copier Ticker'}</button>
      <button class="btn-wl ${wl?'on':''}" onclick="event.stopPropagation();toggleWL('${s.ticker}')">${wl?'⭐':'☆'}</button>
    </div>
  </div>`;
}

function emptyHTML(msg){
  return`<div class="section"><div class="empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
    <h3>${msg}</h3>
    <p>Lance le workflow GitHub pour charger les données.</p>
  </div></div>`;
}

function renderAll_(){
  const el=document.getElementById('viewAll');
  if(!SIGS.length){el.innerHTML=emptyHTML('Aucun signal chargé');return;}
  const buys=SIGS.filter(s=>s._type==='buy');
  const sells=SIGS.filter(s=>s._type==='sell');
  const others=SIGS.filter(s=>s._type!=='buy'&&s._type!=='sell');
  let html='';
  if(buys.length){html+=`<div class="section"><div class="section-title" style="color:var(--buy)">🟢 À Acheter (${buys.length})</div>`;buys.slice(0,5).forEach((s,i)=>html+=makeCard(s,'b'+i));html+='</div>';}
  if(sells.length){html+=`<div class="section"><div class="section-title" style="color:var(--sell)">🔴 À Vendre / Alléger (${sells.length})</div>`;sells.slice(0,5).forEach((s,i)=>html+=makeCard(s,'s'+i));html+='</div>';}
  if(others.length){html+=`<div class="section"><div class="section-title">📌 À Surveiller (${others.length})</div>`;others.slice(0,4).forEach((s,i)=>html+=makeCard(s,'o'+i));html+='</div>';}
  el.innerHTML=html;
}
function renderBuy_(){
  const el=document.getElementById('viewBuy');
  const s=SIGS.filter(x=>x._type==='buy');
  if(!s.length){el.innerHTML=emptyHTML('Aucun signal d\'achat');return;}
  let html=`<div class="section"><div class="section-title" style="color:var(--buy)">🟢 Signaux d'achat (${s.length})</div>`;
  s.forEach((x,i)=>html+=makeCard(x,'buy'+i));
  el.innerHTML=html+'</div>';
}
function renderSell_(){
  const el=document.getElementById('viewSell');
  const s=SIGS.filter(x=>x._type==='sell');
  if(!s.length){el.innerHTML=emptyHTML('Aucun signal de vente');return;}
  let html=`<div class="section"><div class="section-title" style="color:var(--sell)">🔴 Signaux de vente (${s.length})</div>`;
  s.forEach((x,i)=>html+=makeCard(x,'sell'+i));
  el.innerHTML=html+'</div>';
}
function renderWatch_(){
  const el=document.getElementById('viewWatch');
  const s=SIGS.filter(x=>WL.includes(x.ticker));
  if(!s.length){el.innerHTML=`<div class="section"><div class="empty"><div style="font-size:2rem;margin-bottom:12px">⭐</div><h3>Watchlist vide</h3><p>Appuie sur ☆ sur n'importe quel signal pour l'ajouter ici.</p></div></div>`;return;}
  let html=`<div class="section"><div class="section-title">⭐ Ma Watchlist (${s.length})</div>`;
  s.forEach((x,i)=>html+=makeCard(x,'wl'+i));
  el.innerHTML=html+'</div>';
}
function renderAI_(){
  const el=document.getElementById('viewAI');
  const ai=D.ai_analysis;
  if(!ai||!ai.rapport){
    el.innerHTML=`<div class="section"><div class="empty"><div style="font-size:2rem;margin-bottom:12px">🧠</div><h3>Analyse IA non disponible</h3><p>Active DeepSeek dans config.yaml et relance le workflow.</p></div></div>`;
    return;
  }
  const ts=ai.timestamp?new Date(ai.timestamp).toLocaleString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
  const buys=(ai.propositions_achat||[]).map(p=>`
    <div class="ai-prop">
      <div class="ai-prop-head"><span class="ai-prop-ticker">${p.ticker} <span style="font-size:.75rem;color:var(--mu)">${esc(p.nom||'')}</span></span><span class="ai-prop-conf">Score ${p.score}</span></div>
      <div class="ai-prop-why"><strong style="color:var(--mu2);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em">Pourquoi :</strong><br>${esc(p.pourquoi_detaille||p.raison||'—')}</div>
      ${p.risque?`<div class="ai-prop-risk">⚠ Risque : ${esc(p.risque)}</div>`:''}
    </div>`).join('');
  const sells=(ai.propositions_vente||[]).map(p=>`
    <div class="ai-prop sell-prop">
      <div class="ai-prop-head"><span class="ai-prop-ticker">${p.ticker} <span style="font-size:.75rem;color:var(--mu)">${esc(p.nom||'')}</span></span><span class="ai-prop-conf">Score ${p.score}</span></div>
      <div class="ai-prop-why"><strong style="color:var(--mu2);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em">Pourquoi :</strong><br>${esc(p.pourquoi_detaille||p.raison||'—')}</div>
      ${p.risque?`<div class="ai-prop-risk">⚠ Risque : ${esc(p.risque)}</div>`:''}
    </div>`).join('');
  const gs=D.global_signals||[];
  const rap=esc(ai.rapport||'').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  el.innerHTML=`<div class="section">
    <div class="section-title">🧠 Intelligence DeepSeek</div>
    <div class="ai-panel">
      <div class="ai-header"><div class="ai-label">Analyse IA</div><div class="ai-ts">Générée le ${ts}</div></div>
      <div class="ai-body">
        <div class="ai-summary"><p>${rap}</p></div>
        ${buys?`<div style="font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--buy);margin-bottom:8px">Pistes d'achat identifiées</div>${buys}`:''}
        ${sells?`<div style="font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sell);margin:12px 0 8px">Pistes de vente/allègement</div>${sells}`:''}
      </div>
      <div class="ai-footer">
        📋 Sources utilisées : 13F SEC (portefeuilles au ${D.meta?.portfolio_date||'?'}) · ${gs.filter(g=>(g.source||'').includes('Insider')).length} achat(s) insider · ${gs.filter(g=>!(g.source||'').includes('Insider')).length} autre(s) signal(s) · Marché ${D.market?.as_of||'?'}<br>
        ⚠️ Analyse automatisée — pas un conseil en investissement personnalisé.
      </div>
    </div>
  </div>`;
}
function renderGuide_(){
  const el=document.getElementById('viewGuide');
  el.innerHTML=`<div class="section">
    <div class="section-title">❓ Comment utiliser l'app</div>
    <div class="guide-card"><div class="guide-q">Que signifie <span class="action-buy-ex">ACHETER</span> ?</div><div class="guide-a">Un ou plusieurs des plus grands fonds au monde a récemment acheté cette action. Ce n'est pas une obligation — c'est un signal que des experts qui gèrent des milliards font confiance à cette entreprise. Toujours vérifier le contexte avant d'agir.</div></div>
    <div class="guide-card"><div class="guide-q">Que signifie <span class="action-sell-ex">VENDRE</span> ?</div><div class="guide-a">Un grand fonds a vendu tout ou partie de cette position. Cela peut signaler une perte de confiance. Si vous possédez ce titre, c'est un signal d'alerte à analyser.</div></div>
    <div class="guide-card"><div class="guide-q">Comment utiliser l'ISIN avec Trade Republic ?</div><div class="guide-a">Appuie sur le bouton jaune "📋 Copier ISIN". Ouvre Trade Republic, va dans la recherche, colle l'ISIN. Tu arrives directement sur l'action.</div></div>
    <div class="guide-card"><div class="guide-q">C'est quoi le score de confiance ?</div><div class="guide-a">Les points de confiance mesurent la force du signal. 5 points = plusieurs fonds de renom ont fait la même chose. 1 point = signal isolé ou source moins fiable. Plus les points sont remplis, plus le signal est fort.</div></div>
    <div class="guide-card"><div class="guide-q">Pourquoi "Données ~45j" ?</div><div class="guide-a">Les grands fonds américains (13F) déclarent leurs positions 45 jours après la fin du trimestre. Ce que tu vois reflète leur portefeuille d'il y a ~2 mois. Les signaux "insiders" et "activistes" sont plus récents (moins d'une semaine).</div></div>
    <div class="guide-card" style="border-color:rgba(255,71,87,.3)"><div class="guide-q" style="color:var(--sell)">⚠️ Rappel important</div><div class="guide-a">Ces signaux sont des pistes de réflexion. Pas des conseils personnalisés. Ne risque jamais plus que ce que tu peux te permettre de perdre. En cas de doute, consulte un conseiller financier.</div></div>
    <div class="section">
      <div class="section-title">✅ Checklist avant d'acheter</div>
      <div class="cl-card" id="clCard"></div>
    </div>
  </div>`;
  const items=['J\'ai compris ce que fait cette entreprise.','Le signal vient d\'un fond réputé (Berkshire, Pershing…).','J\'ai vérifié le prix actuel — pas juste le signal.','Je n\'investis pas plus de 10% de mon capital.','J\'ai un plan si ça baisse (quand est-ce que je vends ?).','Je ne prends pas cette décision sous le coup de l\'émotion.'];
  document.getElementById('clCard').innerHTML=items.map((t,i)=>`<div class="cl-item"><input type="checkbox" id="cl${i}"><label for="cl${i}">${t}</label></div>`).join('');
}

// ── UTILS ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cp(v,t,ticker){navigator.clipboard.writeText(v).then(()=>toast(`✓ ${ticker} : ${v} copié !`));}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2400);}
function toggleWL(t){WL=WL.includes(t)?WL.filter(x=>x!==t):[...WL,t];localStorage.setItem('smr_wl',JSON.stringify(WL));renderView();}
function toggleDet(id){document.getElementById(id)?.classList.toggle('open');}

let curTab=null;
function switchTab(btn,tab){
  TAB=tab;
  document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  if(btn)btn.className=`tab on-${tab==='all'||tab==='guide'?'all':tab==='buy'?'buy':tab==='sell'?'sell':tab==='watch'?'watch':'all'}`;
  ['all','buy','sell','watch','ai','guide'].forEach(v=>{
    const el=document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1));
    if(el)el.style.display=v===tab?'block':'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b=>b.style.color='');
}

if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
