# --- Seuils de détection (cahier des charges) ---------------
thresholds:
  new_position_min_weight_pct: 0.5   # nouvelle position : poids ≥ 0,5 %
  exit_min_prev_weight_pct: 0.5      # sortie totale : pesait ≥ 0,5 %
  share_change_pct: 20               # variation du nb de titres > 20 %
  big_move_min_weight_pct: 1.0       # ... et poids ≥ 1 %
  top_n: 5                           # surveiller le top 5
  consensus_min_funds: 2             # même mouvement chez ≥ 2 fonds = consensus

# --- Contexte de marché -------------------------------------
market:
  # Indices / matières premières / taux affichés dans le bandeau
  snapshot_tickers:
    "S&P 500": "^GSPC"
    "Nasdaq": "^IXIC"
    "Dow Jones": "^DJI"
    "Russell 2000": "^RUT"
    "VIX": "^VIX"
    "Brent": "BZ=F"
    "WTI": "CL=F"
    "Or": "GC=F"
    "10 ans US": "^TNX"
    "Bitcoin": "BTC-USD"
  # Flux RSS d'actualité (testés en priorité, avec repli automatique)
  rss_feeds:
    - "https://www.investing.com/rss/news_25.rss"      # Investing.com — actu marchés
    - "https://www.investing.com/rss/news_285.rss"     # Investing.com — économie
    - "https://www.financialjuice.com/feed.ashx?xy=rss" # FinancialJuice (peut nécessiter un flux perso)
  # Repli si les flux ci-dessus échouent (Investing.com/FinancialJuice bloquent parfois les robots)
  rss_fallback:
    - "https://news.google.com/rss/search?q=stock+market+when:1d&hl=en-US&gl=US&ceid=US:en"
  tradingeconomics:
    # Clé gratuite limitée : "guest:guest" (quelques pays). Clé complète via secret TE_API_KEY.
    calendar_days_ahead: 7
    min_importance: 2          # 1=faible, 2=moyenne, 3=haute
  llm_commentary: false        # true => lecture marché rédigée via l'API Anthropic (ANTHROPIC_API_KEY)

# --- Email --------------------------------------------------
email:
  subject_prefix: "📈 Smart Money Radar"
  # Adresses et identifiants SMTP fournis via secrets (voir README) :
  #   MAIL_FROM, MAIL_TO, SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS
  send_when_no_alert: true     # envoyer un mail "rien de neuf" hors saison 13F

# --- Site ---------------------------------------------------
site:
  # URL publique du tableau de bord (GitHub Pages) insérée dans l'email
  dashboard_url: "https://VOTRE-UTILISATEUR.github.io/fund-tracker/"

# --- Achats insiders (Form 4 via OpenInsider) ----------------
insiders:
  enabled: true               # désactiver si OpenInsider est inaccessible
  days: 7                     # remonter N jours
  min_value_usd: 50000        # valeur minimale de la transaction

# --- Analyse IA DeepSeek ------------------------------------
deepseek:
  enabled: false              # passer à true + ajouter DEEPSEEK_API_KEY en secret
  model: "deepseek-chat"      # "deepseek-reasoner" pour l'analyse plus profonde
  # Repli automatique sur OpenAI si DEEPSEEK_API_KEY absente et OPENAI_API_KEY présente

# --- Collecteurs additionnels (signaux quotidiens hors 13F) ----------
collectors:
  # 13D/G : déclarations d'activistes franchissant 5% (délai légal 10j)
  dg13: true
  dg13_days: 10

  # Short interest élevé sur les tickers déjà en alerte
  short_interest: true
  short_interest_min_pct: 15    # en % du flottant

  # Calendrier des résultats (publications imminentes)
  earnings: true
  earnings_days_ahead: 7

  # Ratio put/call options (signal directionnel, désactivé car lent)
  options_flow: false

  # ETF UCITS (iShares, Vanguard) — variations quotidiennes de poids
  etf_ucits: true
  etf_min_delta: 0.20       # variation minimale en % pour remonter le signal

  # Fonds mutuels top 10 (Fundsmith, Baillie Gifford, T. Rowe Price)
  fund_top10: true

  # Fonds souverain NBIM (Norges Bank Investment Management)
  nbim: true

  # Conglomérats (SoftBank, Berkshire 8-K, etc.)
  conglomerates: true

  # Régulateurs européens (AMF France, BaFin Allemagne)
  amf_bafin: true
