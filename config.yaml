#     sont à confirmer avant le premier run.
#
# tier : actionnable | contexte | faible-signal
#   - actionnable  : portefeuille concentré, signal fort
#   - contexte     : utile pour les grands thèmes
#   - faible-signal: indiciel/diversifié (variations ≈ rééquilibrage)

